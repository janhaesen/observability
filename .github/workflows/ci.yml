name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests, API compatibility, and static analysis
        run: ./gradlew test apiCheck detekt --no-daemon

      - name: Publish dry-run
        run: ./gradlew publish --dry-run --no-daemon

  cve-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OSV CVE scan
        uses: google/osv-scanner-action@v2
        with:
          scan-args: |-
            -r .
