name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Run tests, API compatibility, and static analysis
        run: ./gradlew test apiCheck detekt --no-daemon

      - name: Publish dry-run
        run: ./gradlew publish --dry-run --no-daemon

  cve-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run OSV CVE scan
        uses: google/osv-scanner-action@v1
        with:
          scan-args: |
            -r .
