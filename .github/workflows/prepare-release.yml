name: Prepare Release (Deprecated)

on:
  workflow_dispatch:
    inputs: {}

permissions:
  contents: read

concurrency:
  group: prepare-release-deprecated
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Explain deprecation
        run: |
          echo "This workflow is deprecated because branch protection requires pull requests for main."
          echo "Use the 'Create Release PR' workflow to bump VERSION_NAME through a PR."
          echo "After the PR is merged with the release label, 'Tag Release' and 'Release' will run automatically."
          exit 1
